!
log stderr
 logging level all debug

line vty
 no login

cs7 instance 0
 point-code 0.23.1

 ! M3UA listener
 listen m3ua 2905
  accept-asp-connections dynamic-permitted

 ! Application Server (REQUIRED)
 as as1 m3ua
  routing-key 1 0.23.1
  traffic-mode loadshare

 ! Allow dynamic ASP to register
 xua rkm routing-key-allocation dynamic-permitted

